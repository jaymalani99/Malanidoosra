<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEAD FINDER — malanidoosra</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Unbounded:wght@300;400;700;900&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1f1f1f;
    --border-bright: #2a2a2a;
    --accent: #c8ff00;
    --accent-dim: #8aab00;
    --text: #e8e8e8;
    --text-muted: #555;
    --text-mid: #888;
    --red: #ff3b3b;
    --blue: #3b8bff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SCANLINE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .logo span {
    color: var(--text-muted);
    font-weight: 300;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
  }
  .dot.active { background: var(--accent); animation: pulse 2s infinite; }
  .dot.error { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 32px;
  }

  .section-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* CONTROL PANEL */
  .control-panel {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 28px;
    margin-bottom: 32px;
  }

  .control-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field.full { grid-column: 1 / -1; }

  .field label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .field input,
  .field select,
  .field textarea {
    background: var(--bg);
    border: 1px solid var(--border-bright);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    border-color: var(--accent);
  }

  .field select option { background: #111; }

  .field textarea { resize: vertical; min-height: 80px; }

  /* TOGGLE CHIPS */
  .chip-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    padding: 6px 14px;
    border: 1px solid var(--border-bright);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    cursor: pointer;
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .chip:hover { border-color: var(--text-mid); color: var(--text); }

  .chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }

  /* RUN BUTTON */
  .run-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .run-btn:hover { background: #d4ff1a; transform: translateY(-1px); }
  .run-btn:active { transform: translateY(0); }
  .run-btn:disabled { background: var(--border-bright); color: var(--text-muted); cursor: not-allowed; transform: none; }

  .run-btn .btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  /* TERMINAL LOG */
  .terminal {
    border: 1px solid var(--border);
    background: #050505;
    padding: 0;
    margin-bottom: 32px;
    display: none;
  }

  .terminal.visible { display: block; }

  .terminal-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
  }

  .terminal-body {
    padding: 16px;
    min-height: 80px;
    max-height: 200px;
    overflow-y: auto;
    font-size: 11px;
    line-height: 1.8;
  }

  .log-line { display: flex; gap: 12px; }
  .log-time { color: var(--text-muted); flex-shrink: 0; }
  .log-msg { color: var(--text-mid); }
  .log-msg.success { color: var(--accent); }
  .log-msg.error { color: var(--red); }
  .log-msg.info { color: var(--blue); }

  /* RESULTS */
  .results-area { display: none; }
  .results-area.visible { display: block; }

  .results-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .results-count {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
  }

  .results-count span { color: var(--accent); font-size: 18px; font-weight: 900; }

  .export-btn {
    padding: 8px 16px;
    border: 1px solid var(--border-bright);
    background: transparent;
    color: var(--text-mid);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .export-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* LEAD CARD */
  .lead-card {
    border: 1px solid var(--border);
    background: var(--surface);
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .lead-card:hover { border-color: var(--border-bright); }

  .lead-card.expanded { border-color: var(--accent); }

  .lead-header {
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    cursor: pointer;
    align-items: start;
  }

  .lead-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .lead-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .tag {
    padding: 3px 8px;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border: 1px solid;
  }

  .tag.type-brand { border-color: #3b8bff44; color: var(--blue); }
  .tag.type-corp { border-color: #ff8c3b44; color: #ff8c3b; }
  .tag.type-wedding { border-color: #c03bff44; color: #c03bff; }
  .tag.type-travel { border-color: var(--accent-dim); color: var(--accent); }
  .tag.source { border-color: var(--border-bright); color: var(--text-muted); }

  .lead-score {
    text-align: right;
    flex-shrink: 0;
  }

  .score-num {
    font-family: 'Unbounded', sans-serif;
    font-size: 22px;
    font-weight: 900;
    line-height: 1;
    margin-bottom: 4px;
  }

  .score-num.high { color: var(--accent); }
  .score-num.mid { color: #ff8c3b; }
  .score-num.low { color: var(--text-muted); }

  .score-label {
    font-size: 8px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* EXPANDED CONTENT */
  .lead-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 24px;
  }

  .lead-card.expanded .lead-body { display: block; }

  .lead-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }

  .detail-block label {
    font-size: 8px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    display: block;
    margin-bottom: 6px;
  }

  .detail-block p {
    font-size: 12px;
    color: var(--text-mid);
    line-height: 1.6;
  }

  .detail-block a {
    color: var(--accent);
    text-decoration: none;
  }

  .detail-block a:hover { text-decoration: underline; }

  /* PITCH SECTION */
  .pitch-section {
    border: 1px solid var(--border);
    background: var(--bg);
    padding: 20px;
  }

  .pitch-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .pitch-text {
    font-size: 12px;
    line-height: 1.9;
    color: var(--text-mid);
    white-space: pre-wrap;
    margin-bottom: 16px;
    min-height: 100px;
  }

  .pitch-text .generating {
    color: var(--text-muted);
    font-style: italic;
  }

  .pitch-actions {
    display: flex;
    gap: 10px;
  }

  .pitch-btn {
    padding: 8px 16px;
    border: 1px solid var(--border-bright);
    background: transparent;
    color: var(--text-mid);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .pitch-btn.primary {
    border-color: var(--accent);
    color: var(--accent);
  }

  .pitch-btn:hover { background: var(--border); color: var(--text); }
  .pitch-btn.primary:hover { background: var(--accent); color: #000; }

  /* LOADING ANIMATION */
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 13px;
    background: var(--accent);
    animation: blink 0.8s infinite;
    vertical-align: middle;
    margin-left: 2px;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 11px;
    letter-spacing: 0.1em;
    line-height: 2;
    border: 1px dashed var(--border);
  }

  .empty-state .big {
    font-family: 'Unbounded', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--border-bright);
    display: block;
    margin-bottom: 12px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* TYPING ANIMATION */
  @keyframes typeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .lead-card { animation: typeIn 0.3s ease forwards; }
</style>
</head>
<body>

<header class="header">
  <div class="logo">MALANI<span>DOOSRA</span> / LEAD FINDER</div>
  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">READY</span>
  </div>
</header>

<main class="main">

  <!-- CONTROL PANEL -->
  <div class="section-label">01 — SEARCH CONFIG</div>
  <div class="control-panel">
    <div class="control-grid">

      <div class="field">
        <label>Your Name</label>
        <input type="text" id="yourName" value="Jay Malani" />
      </div>

      <div class="field">
        <label>Portfolio URL</label>
        <input type="text" id="portfolioUrl" value="https://malanidoosra.vercel.app" />
      </div>

      <div class="field full">
        <label>Location Focus</label>
        <input type="text" id="location" value="Mumbai, India" />
      </div>

      <div class="field full">
        <label>Work Type (select all that apply)</label>
        <div class="chip-group" id="workTypes">
          <button class="chip active" data-val="Brand/Product Shoots">Brand Shoots</button>
          <button class="chip active" data-val="Corporate Films">Corporate Films</button>
          <button class="chip active" data-val="Wedding/Events">Wedding & Events</button>
          <button class="chip active" data-val="Travel Documentary">Travel Doc</button>
          <button class="chip" data-val="Music Videos">Music Videos</button>
          <button class="chip" data-val="Reels/Social Content">Reels / Social</button>
        </div>
      </div>

      <div class="field full">
        <label>Lead Sources (select all that apply)</label>
        <div class="chip-group" id="sources">
          <button class="chip active" data-val="LinkedIn">LinkedIn</button>
          <button class="chip active" data-val="Instagram brands">Instagram Brands</button>
          <button class="chip active" data-val="Job boards">Job Boards</button>
          <button class="chip active" data-val="Google Search">Google Search</button>
        </div>
      </div>

      <div class="field full">
        <label>Any specific niches or brands to target? (optional)</label>
        <textarea id="extraContext" placeholder="e.g. D2C skincare brands, hospitality / hotel brands, fintech companies with active social..."></textarea>
      </div>

      <div class="field full">
        <label>Anthropic API Key <span style="color:var(--red)">— never saved, browser only</span></label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off" />
      </div>

    </div>

    <button class="run-btn" id="runBtn" onclick="runAgent()">
      <div class="btn-inner">
        <span>▶ FIND LEADS + GENERATE PITCHES</span>
      </div>
    </button>
  </div>

  <!-- TERMINAL -->
  <div class="terminal" id="terminal">
    <div class="terminal-header">
      <div class="dot active"></div>
      <span>AGENT LOG</span>
    </div>
    <div class="terminal-body" id="terminalBody"></div>
  </div>

  <!-- RESULTS -->
  <div class="results-area" id="resultsArea">
    <div class="section-label">02 — LEADS FOUND</div>
    <div class="results-meta">
      <div class="results-count"><span id="leadCount">0</span> LEADS IDENTIFIED</div>
      <button class="export-btn" onclick="exportLeads()">↓ EXPORT CSV</button>
    </div>
    <div id="leadsList"></div>
  </div>

  <!-- EMPTY STATE -->
  <div class="empty-state" id="emptyState">
    <span class="big">—</span>
    configure your search above<br>
    and hit run to find leads
  </div>

</main>

<script>
  let leads = [];
  let logInterval;

  // Chip toggles
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => chip.classList.toggle('active'));
  });

  function getSelected(groupId) {
    return [...document.querySelectorAll(`#${groupId} .chip.active`)].map(c => c.dataset.val);
  }

  function setStatus(state, text) {
    const dot = document.getElementById('statusDot');
    dot.className = 'dot ' + state;
    document.getElementById('statusText').textContent = text;
  }

  function log(msg, type = '') {
    const body = document.getElementById('terminalBody');
    const now = new Date();
    const time = now.toTimeString().slice(0,8);
    const line = document.createElement('div');
    line.className = 'log-line';
    line.innerHTML = `<span class="log-time">${time}</span><span class="log-msg ${type}">${msg}</span>`;
    body.appendChild(line);
    body.scrollTop = body.scrollHeight;
  }

  async function runAgent() {
    const name = document.getElementById('yourName').value.trim();
    const portfolio = document.getElementById('portfolioUrl').value.trim();
    const location = document.getElementById('location').value.trim();
    const workTypes = getSelected('workTypes');
    const sources = getSelected('sources');
    const extraContext = document.getElementById('extraContext').value.trim();

    if (!workTypes.length || !sources.length) {
      alert('Select at least one work type and source.');
      return;
    }

    // UI setup
    document.getElementById('runBtn').disabled = true;
    document.getElementById('terminal').classList.add('visible');
    document.getElementById('terminalBody').innerHTML = '';
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('resultsArea').classList.remove('visible');
    document.getElementById('leadsList').innerHTML = '';
    leads = [];

    setStatus('active', 'RUNNING');

    log('Initialising lead finder agent...', 'info');
    log(`Target: ${location} · Work: ${workTypes.join(', ')}`, '');
    log(`Sources: ${sources.join(', ')}`, '');
    if (extraContext) log(`Extra context: ${extraContext.slice(0,80)}...`, '');
    log('Calling Claude API...', 'info');

    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey || !apiKey.startsWith('sk-ant-')) {
      log('ERROR: Enter a valid Anthropic API key above.', 'error');
      setStatus('error', 'NO API KEY');
      document.getElementById('runBtn').disabled = false;
      return;
    }

    const prompt = buildPrompt(name, portfolio, location, workTypes, sources, extraContext);

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await response.json();

      if (data.error) throw new Error(data.error.message);

      const raw = data.content[0].text;
      log('Response received. Parsing leads...', 'success');

      // Extract JSON
      const jsonMatch = raw.match(/```json\n?([\s\S]*?)\n?```/) || raw.match(/(\[[\s\S]*\])/);
      if (!jsonMatch) throw new Error('Could not parse lead JSON from response');

      leads = JSON.parse(jsonMatch[1]);
      log(`${leads.length} leads identified.`, 'success');
      log('Rendering cards...', '');

      renderLeads(leads, name, portfolio);
      setStatus('active', `${leads.length} LEADS FOUND`);

    } catch (err) {
      log(`ERROR: ${err.message}`, 'error');
      setStatus('error', 'ERROR');
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('emptyState').innerHTML = `<span class="big">!</span>${err.message}`;
    }

    document.getElementById('runBtn').disabled = false;
  }

  function buildPrompt(name, portfolio, location, workTypes, sources, extra) {
    return `You are a lead research agent for a filmmaker/cinematographer named ${name} based in ${location}.

Portfolio: ${portfolio}

They are looking for paid work in: ${workTypes.join(', ')}
Lead sources to consider: ${sources.join(', ')}
${extra ? `Additional targeting context: ${extra}` : ''}

Your job:
1. Generate 8–10 realistic, specific, named leads — actual companies, brands, agencies, or production houses based in ${location} or operating there — that would plausibly hire a freelance cinematographer/filmmaker for the work types listed.
2. For each lead, write a short personalised cold email pitch (5–7 lines max) that feels human, not templated.

Rules for leads:
- Use REAL company names that exist (brands, agencies, production houses, event companies, hotels, D2C brands)
- Vary the lead types across the work categories requested
- Mix big names and smaller boutique ones
- Assign a fit score 1–10 based on how likely they hire freelance cinematographers

Rules for pitches:
- Start with a specific observation about that company (their recent campaign, their product, their aesthetic) — make it feel researched
- Mention ${name}'s relevant experience for that specific lead
- Include portfolio URL: ${portfolio}
- End with a soft CTA — not pushy
- No "Dear Sir/Madam", no corporate stiffness
- Max 7 lines

Respond ONLY with a JSON array. No preamble, no explanation. Format:

\`\`\`json
[
  {
    "id": 1,
    "company": "Company Name",
    "type": "Brand Shoot | Corporate Film | Wedding | Travel Doc",
    "location": "Mumbai / Remote",
    "source": "LinkedIn | Instagram | Google | Job Board",
    "contact": "careers@company.com or @handle or LinkedIn URL",
    "why_fit": "One sentence on why this is a good match",
    "about": "2 sentence description of what this company does",
    "fit_score": 8,
    "pitch_subject": "Email subject line",
    "pitch_body": "Full pitch text here"
  }
]
\`\`\``;
  }

  function renderLeads(leads, name, portfolio) {
    const list = document.getElementById('leadsList');
    document.getElementById('leadCount').textContent = leads.length;
    document.getElementById('resultsArea').classList.add('visible');

    leads.forEach((lead, i) => {
      const card = document.createElement('div');
      card.className = 'lead-card';
      card.id = `lead-${i}`;

      const scoreClass = lead.fit_score >= 8 ? 'high' : lead.fit_score >= 6 ? 'mid' : 'low';
      const typeClass = lead.type?.toLowerCase().includes('brand') ? 'type-brand'
        : lead.type?.toLowerCase().includes('corp') ? 'type-corp'
        : lead.type?.toLowerCase().includes('wedding') ? 'type-wedding' : 'type-travel';

      card.innerHTML = `
        <div class="lead-header" onclick="toggleCard(${i})">
          <div>
            <div class="lead-name">${lead.company}</div>
            <div class="lead-meta">
              <span class="tag ${typeClass}">${lead.type}</span>
              <span class="tag source">${lead.source}</span>
              <span class="tag source">${lead.location}</span>
            </div>
          </div>
          <div class="lead-score">
            <div class="score-num ${scoreClass}">${lead.fit_score}</div>
            <div class="score-label">FIT SCORE</div>
          </div>
        </div>
        <div class="lead-body">
          <div class="lead-grid">
            <div class="detail-block">
              <label>About</label>
              <p>${lead.about}</p>
            </div>
            <div class="detail-block">
              <label>Why You Fit</label>
              <p>${lead.why_fit}</p>
            </div>
            <div class="detail-block">
              <label>Contact / Find At</label>
              <p><a href="${lead.contact}" target="_blank">${lead.contact}</a></p>
            </div>
          </div>
          <div class="pitch-section">
            <div class="pitch-label">
              <span>✉ DRAFT PITCH</span>
              <span style="color: var(--text-muted); font-size:9px">SUBJ: ${lead.pitch_subject}</span>
            </div>
            <div class="pitch-text" id="pitch-${i}">${lead.pitch_body}</div>
            <div class="pitch-actions">
              <button class="pitch-btn primary" onclick="copyPitch(${i})">↗ COPY PITCH</button>
              <button class="pitch-btn" onclick="regenPitch(${i}, '${encodeURIComponent(lead.company)}', '${encodeURIComponent(lead.type)}')">↺ REGENERATE</button>
            </div>
          </div>
        </div>
      `;

      setTimeout(() => list.appendChild(card), i * 80);
    });
  }

  function toggleCard(i) {
    const card = document.getElementById(`lead-${i}`);
    card.classList.toggle('expanded');
  }

  function copyPitch(i) {
    const pitch = document.getElementById(`pitch-${i}`).innerText;
    const lead = leads[i];
    const full = `Subject: ${lead.pitch_subject}\n\n${pitch}`;
    navigator.clipboard.writeText(full).then(() => {
      const btn = event.target;
      btn.textContent = '✓ COPIED';
      setTimeout(() => btn.textContent = '↗ COPY PITCH', 2000);
    });
  }

  async function regenPitch(i, companyEnc, typeEnc) {
    const company = decodeURIComponent(companyEnc);
    const type = decodeURIComponent(typeEnc);
    const pitchEl = document.getElementById(`pitch-${i}`);
    const name = document.getElementById('yourName').value;
    const portfolio = document.getElementById('portfolioUrl').value;

    pitchEl.innerHTML = '<span class="generating">Regenerating<span class="cursor"></span></span>';

    const apiKey = document.getElementById('apiKey').value.trim();
    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 500,
          messages: [{
            role: 'user',
            content: `Write a fresh cold email pitch from filmmaker ${name} to ${company} (${type} work) in Mumbai. Portfolio: ${portfolio}. 5-7 lines, human tone, specific opening observation about the company, soft CTA. No subject line needed, just the body.`
          }]
        })
      });
      const data = await response.json();
      const newPitch = data.content[0].text;
      pitchEl.textContent = newPitch;
      leads[i].pitch_body = newPitch;
    } catch(e) {
      pitchEl.textContent = 'Error regenerating. Try again.';
    }
  }

  function exportLeads() {
    if (!leads.length) return;
    const headers = ['Company', 'Type', 'Source', 'Location', 'Contact', 'Fit Score', 'Why Fit', 'Pitch Subject'];
    const rows = leads.map(l => [
      `"${l.company}"`, `"${l.type}"`, `"${l.source}"`, `"${l.location}"`,
      `"${l.contact}"`, l.fit_score, `"${l.why_fit}"`, `"${l.pitch_subject}"`
    ]);
    const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'malani_leads.csv';
    a.click();
  }
</script>

</body>
</html>
